# CogOS Node — Default Values
#
# This umbrella chart deploys a complete CogOS node.
# Enable/disable organelles as needed.

# Kernel settings (always enabled)
cogos-kernel:
  image:
    repository: ghcr.io/myrgic/cogos
    tag: latest
  port: 5200
  workspace:
    path: /workspace
    storageClass: ""
    size: 10Gi

# Mod³ modality server (optional)
mod3:
  enabled: false

cogos-mod3:
  image:
    repository: ghcr.io/myrgic/mod3
    tag: latest
  port: 5300
  kernel:
    endpoint: "http://{{ .Release.Name }}-cogos-kernel:5200"
